<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoQueue – Report Waste</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
        }

        header {
            background: #1a7a4a;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        header span {
            font-size: 1.6rem;
        }

        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            font-size: 1.1rem;
            color: #1a7a4a;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 4px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            font-family: inherit;
            outline: none;
            transition: border 0.2s;
        }

        input:focus,
        textarea:focus {
            border-color: #1a7a4a;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1a7a4a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover {
            background: #155f3a;
        }

        .toast {
            display: none;
            margin-top: 1rem;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
        }

        .toast.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .toast.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .queue-section {
            margin-top: 2rem;
        }

        .queue-section h2 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 1rem;
        }

        .report-card {
            background: white;
            border-radius: 10px;
            padding: 1rem 1.2rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
            border-left: 4px solid #1a7a4a;
        }

        .report-card .loc {
            font-weight: 600;
            color: #1a7a4a;
            font-size: 0.95rem;
        }

        .report-card .desc {
            color: #555;
            font-size: 0.88rem;
            margin-top: 4px;
        }

        .report-card .time {
            color: #aaa;
            font-size: 0.78rem;
            margin-top: 6px;
        }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #fef3c7;
            color: #92400e;
        }

        .admin-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #888;
        }

        .admin-link a {
            color: #1a7a4a;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <header>
        <span>♻️</span>
        <h1>EcoQueue – Waste Reporting System</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>📍 Submit a Waste Report</h2>
            <label>Location</label>
            <input type="text" id="location" placeholder="e.g. Sector 14, Near Bus Stand" />
            <label>Description</label>
            <textarea id="description" placeholder="Describe the waste issue..."></textarea>
            <button onclick="submitReport()">Submit Report</button>
            <div class="toast" id="toast"></div>
        </div>

        <div class="queue-section">
            <h2>🕐 Pending Reports in Queue (<span id="count">0</span>)</h2>
            <div id="queue-list"></div>
        </div>

        <div class="admin-link">
            <a href="admin.html">Go to Admin Dashboard →</a>
        </div>
    </div>

    <script>
        async function submitReport() {
            const location = document.getElementById('location').value.trim()
            const description = document.getElementById('description').value.trim()
            const toast = document.getElementById('toast')

            if (!location || !description) {
                toast.className = 'toast error'
                toast.textContent = 'Please fill in both fields.'
                return
            }

            try {
                const res = await fetch('/api/producer/report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location, description })
                })
                const data = await res.json()

                if (res.ok) {
                    toast.className = 'toast success'
                    toast.textContent = '✅ Report submitted successfully!'
                    document.getElementById('location').value = ''
                    document.getElementById('description').value = ''
                    loadQueue()
                } else {
                    toast.className = 'toast error'
                    toast.textContent = '❌ Error: ' + data.error
                }
            } catch (err) {
                toast.className = 'toast error'
                toast.textContent = '❌ Server error. Is the server running?'
            }
        }

        async function loadQueue() {
            const res = await fetch('/api/producer/queue')
            const data = await res.json()
            document.getElementById('count').textContent = data.count
            const list = document.getElementById('queue-list')
            list.innerHTML = ''
            if (data.queue.length === 0) {
                list.innerHTML = '<p style="color:#aaa;font-size:0.9rem;">No pending reports.</p>'
                return
            }
            data.queue.forEach(r => {
                list.innerHTML += `
        <div class="report-card">
          <div class="loc">📍 ${r.location} <span class="badge">pending</span></div>
          <div class="desc">${r.description}</div>
          <div class="time">🕐 ${new Date(r.created_at).toLocaleString()}</div>
        </div>`
            })
        }

        loadQueue()
        setInterval(loadQueue, 5000)
    </script>
</body>

</html>
