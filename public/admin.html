<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoQueue – Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
        }

        header {
            background: #1e3a5f;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 600;
            color: #1e3a5f;
        }

        .stat-card .label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        .process-btn {
            width: 100%;
            padding: 14px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: background 0.2s;
        }

        .process-btn:hover {
            background: #162d4a;
        }

        .process-btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .toast {
            display: none;
            margin-bottom: 1rem;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
        }

        .toast.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }

        .toast.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .toast.info {
            background: #dbeafe;
            color: #1e40af;
            display: block;
        }

        h2 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 1rem;
        }

        .report-card {
            background: white;
            border-radius: 10px;
            padding: 1rem 1.2rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
        }

        .report-card.pending {
            border-left: 4px solid #f59e0b;
        }

        .report-card.processed {
            border-left: 4px solid #10b981;
        }

        .report-card .loc {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .report-card.pending .loc {
            color: #92400e;
        }

        .report-card.processed .loc {
            color: #065f46;
        }

        .report-card .desc {
            color: #555;
            font-size: 0.88rem;
            margin-top: 4px;
        }

        .report-card .time {
            color: #aaa;
            font-size: 0.78rem;
            margin-top: 6px;
        }

        .badge-pending {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            background: #fef3c7;
            color: #92400e;
        }

        .badge-processed {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            background: #d1fae5;
            color: #065f46;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #888;
        }

        .back-link a {
            color: #1e3a5f;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <header>
        <h1>🛠️ EcoQueue – Admin Dashboard</h1>
        <span style="font-size:0.85rem; opacity:0.7;">Consumer Module</span>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="pending-count">0</div>
                <div class="label">Pending in Queue</div>
            </div>
            <div class="stat-card">
                <div class="number" id="processed-count">0</div>
                <div class="label">Processed</div>
            </div>
            <div class="stat-card">
                <div class="number" id="total-count">0</div>
                <div class="label">Total Reports</div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
        <button class="process-btn" onclick="processNext()">
            ⚙️ Process Next Report in Queue
        </button>

        <h2>🕐 Pending Queue</h2>
        <div id="pending-list"></div>

        <h2 style="margin-top:1.5rem;">✅ Processed Reports</h2>
        <div id="processed-list"></div>

        <div class="back-link">
            <a href="index.html">← Back to Citizen Portal</a>
        </div>
    </div>

    <script>
        async function processNext() {
            const toast = document.getElementById('toast')
            const btn = document.querySelector('.process-btn')
            btn.disabled = true
            btn.textContent = '⏳ Processing...'

            try {
                const res = await fetch('/api/consumer/process', { method: 'POST' })
                const data = await res.json()

                if (res.ok) {
                    toast.className = 'toast success'
                    toast.textContent = `✅ Processed report from: ${data.report.location}`
                } else {
                    toast.className = 'toast info'
                    toast.textContent = '📭 ' + data.message
                }
            } catch (err) {
                toast.className = 'toast error'
                toast.textContent = '❌ Server error.'
            }

            btn.disabled = false
            btn.textContent = '⚙️ Process Next Report in Queue'
            loadData()
        }

        async function loadData() {
            const pendingRes = await fetch('/api/producer/queue')
            const pendingData = await pendingRes.json()

            const processedRes = await fetch('/api/consumer/processed')
            const processedData = await processedRes.json()

            document.getElementById('pending-count').textContent = pendingData.count
            document.getElementById('processed-count').textContent = processedData.count
            document.getElementById('total-count').textContent = pendingData.count + processedData.count

            const pendingList = document.getElementById('pending-list')
            pendingList.innerHTML = ''
            if (pendingData.queue.length === 0) {
                pendingList.innerHTML = '<p style="color:#aaa;font-size:0.9rem;">Queue is empty.</p>'
            } else {
                pendingData.queue.forEach(r => {
                    pendingList.innerHTML += `
          <div class="report-card pending">
            <div class="loc">📍 ${r.location} <span class="badge-pending">pending</span></div>
            <div class="desc">${r.description}</div>
            <div class="time">🕐 ${new Date(r.created_at).toLocaleString()}</div>
          </div>`
                })
            }

            const processedList = document.getElementById('processed-list')
            processedList.innerHTML = ''
            if (processedData.processed.length === 0) {
                processedList.innerHTML = '<p style="color:#aaa;font-size:0.9rem;">No processed reports yet.</p>'
            } else {
                processedData.processed.forEach(r => {
                    processedList.innerHTML += `
          <div class="report-card processed">
            <div class="loc">📍 ${r.location} <span class="badge-processed">processed</span></div>
            <div class="desc">${r.description}</div>
            <div class="time">✅ ${new Date(r.processed_at).toLocaleString()}</div>
          </div>`
                })
            }
        }

        loadData()
        setInterval(loadData, 4000)
    </script>
</body>

</html>
